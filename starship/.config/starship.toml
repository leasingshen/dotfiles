# Catppuccin Macchiato theme for Starship
# https://github.com/catppuccin/starship

palette = "catppuccin_macchiato"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"

# ── Prompt format ─────────────────────────────────────────────────────────────
format = """
[╭─](overlay0)$os$username$hostname$directory$git_branch$git_status$git_state\
$nodejs$python$rust$golang$java$c$cmake$docker_context$nix_shell$env_var\
$cmd_duration
[╰─](overlay0)$character"""

# ── OS ────────────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bold blue"

[os.symbols]
Linux   = " "
Windows = "󰍲 "
Macos   = " "

# ── Username ──────────────────────────────────────────────────────────────────
[username]
style_user  = "bold mauve"
style_root  = "bold red"
format      = "[$user]($style) "
show_always = false

# ── Hostname ──────────────────────────────────────────────────────────────────
[hostname]
ssh_only  = false
style     = "bold sapphire"
format    = "[@$hostname]($style) "
disabled  = false

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
style            = "bold lavender"
read_only_style  = "bold red"
read_only        = " 󰌾"
truncation_length = 4
truncate_to_repo = false
format           = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
style  = "bold green"
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "bold yellow"
format    = "([$all_status$ahead_behind]($style) )"
conflicted = "󰞇 "
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "? "
stashed    = " "
modified   = "! "
staged     = "+ "
renamed    = "» "
deleted    = "✘ "

[git_state]
style   = "bold peach"
format  = "[$state($progress_current/$progress_total)]($style) "

# ── Languages ────────────────────────────────────────────────────────────────
[nodejs]
style  = "bold green"
symbol = " "
format = "[$symbol($version)]($style) "

[python]
style          = "bold yellow"
symbol         = " "
format         = "[$symbol$pyenv_prefix($version)(\\($virtualenv\\))]($style) "
python_binary  = ["python3", "python"]

[rust]
style  = "bold peach"
symbol = " "
format = "[$symbol($version)]($style) "

[golang]
style  = "bold sky"
symbol = " "
format = "[$symbol($version)]($style) "

[java]
style  = "bold red"
symbol = " "
format = "[$symbol($version)]($style) "

[c]
style  = "bold sapphire"
symbol = " "
format = "[$symbol($version(-$name))]($style) "

[cmake]
style  = "bold blue"
format = "[$symbol($version)]($style) "

# ── Tools ─────────────────────────────────────────────────────────────────────
[docker_context]
style  = "bold blue"
symbol = " "
format = "[$symbol$context]($style) "

[nix_shell]
style  = "bold blue"
symbol = " "
format = "[$symbol$state(\\($name\\))]($style) "

# ── Duration & Character ──────────────────────────────────────────────────────
[cmd_duration]
style          = "bold overlay2"
min_time       = 2_000
format         = "[ $duration]($style) "
show_milliseconds = false

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"
